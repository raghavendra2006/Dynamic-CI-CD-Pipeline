# =============================================================================
# SonarQube Service
# Exposes SonarQube on NodePort 9000 (matching user's localhost:9000)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-service
  namespace: devops-tools
  labels:
    app.kubernetes.io/name: sonarqube
    app.kubernetes.io/component: code-quality
    app.kubernetes.io/part-of: dynamic-cicd-pipeline
spec:
  type: NodePort
  selector:
    app: sonarqube
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      nodePort: 30900
      protocol: TCP
