# =============================================================================
# Staging Environment - Application Deployment
# Automatically deployed after all CI stages pass
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-demo-app
  namespace: staging
  labels:
    app: pipeline-demo-app
    environment: staging
    app.kubernetes.io/name: pipeline-demo-app
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: dynamic-cicd-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pipeline-demo-app
      environment: staging
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pipeline-demo-app
        environment: staging
        version: staging
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: pipeline-demo-app
          image: nexus-service.devops-tools.svc.cluster.local:8082/pipeline-demo-app:latest
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: APP_ENVIRONMENT
              value: "staging"
            - name: DEPLOYMENT_COLOR
              value: "N/A"
            - name: APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['version']
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
