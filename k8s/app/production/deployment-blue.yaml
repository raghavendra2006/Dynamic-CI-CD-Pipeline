# =============================================================================
# Production Environment - BLUE Deployment
# Part of the Blue-Green deployment strategy
# Blue is the initial active deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-demo-app-blue
  namespace: production
  labels:
    app: pipeline-demo-app
    version: blue
    environment: production
    app.kubernetes.io/name: pipeline-demo-app
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: dynamic-cicd-pipeline
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pipeline-demo-app
      version: blue
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pipeline-demo-app
        version: blue
        environment: production
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: pipeline-demo-app
          image: nexus-service.devops-tools.svc.cluster.local:8082/pipeline-demo-app:latest
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: APP_ENVIRONMENT
              value: "production"
            - name: DEPLOYMENT_COLOR
              value: "blue"
            - name: APP_VERSION
              value: "1.0.0"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
