# =============================================================================
# Nexus Service
# Exposes Nexus Repository Manager and Docker Registry via NodePort
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: nexus-service
  namespace: devops-tools
  labels:
    app.kubernetes.io/name: nexus
    app.kubernetes.io/component: artifact-repository
    app.kubernetes.io/part-of: dynamic-cicd-pipeline
spec:
  type: NodePort
  selector:
    app: nexus
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081
      protocol: TCP
    - name: docker-registry
      port: 8082
      targetPort: 8082
      nodePort: 30082
      protocol: TCP
